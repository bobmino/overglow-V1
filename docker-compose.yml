services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: overglow
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/overglow
      MONGO_DB_NAME: overglow
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.overglow.online}
      SITE_URL: ${SITE_URL:-https://www.overglow.online}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.overglow.online,https://overglow.online}
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Overglow Trip <noreply@overglow.online>}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "5001"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://www.overglow.online}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://www.overglow.online}
    restart: unless-stopped
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  mongo_data:
  uploads_data:
