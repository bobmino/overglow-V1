name: Deploy VPS

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"
          APP_PATH="${VPS_APP_PATH:-/root/overglow-V1}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Secret = clé PEM multiligne OU base64 (recommandé, évite libcrypto)
          if printf '%s' "$SSH_PRIVATE_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
            printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/id_deploy
          else
            printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_deploy
          fi
          chmod 600 ~/.ssh/id_deploy

          # Valide la clé avant SSH
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

          ssh-keyscan -H -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Connecting to ${VPS_USER}@${VPS_HOST} ..."
          ssh -i ~/.ssh/id_deploy -p 22 -o IdentitiesOnly=yes -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" bash -s <<EOF
          set -e
          cd "${APP_PATH}"
          echo "Deploy in \$(pwd) as \$(whoami)"
          git fetch origin main
          git reset --hard origin/main
          docker compose pull || true
          docker compose up -d --build
          docker compose ps
          EOF
