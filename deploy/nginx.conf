# Reverse proxy TLS — certificats Let's Encrypt montés depuis l'hôte
upstream overglow_api {
    server api:5001;
}

upstream overglow_web {
    server web:80;
}

server {
    listen 80;
    server_name www.overglow.online overglow.online;
    return 301 https://www.overglow.online$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name overglow.online;
    ssl_certificate     /etc/letsencrypt/live/www.overglow.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.overglow.online/privkey.pem;
    return 301 https://www.overglow.online$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.overglow.online;

    ssl_certificate     /etc/letsencrypt/live/www.overglow.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.overglow.online/privkey.pem;

    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://overglow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://overglow_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://overglow_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
