# Host / reverse-proxy example for www.overglow.online
# Place behind Certbot or terminate TLS at this layer.

upstream overglow_api {
    server api:5001;
}

upstream overglow_web {
    server web:80;
}

server {
    listen 80;
    server_name www.overglow.online overglow.online;

    client_max_body_size 12m;

    # Redirect apex → www (optional; enable when DNS ready)
    # if ($host = overglow.online) {
    #     return 301 https://www.overglow.online$request_uri;
    # }

    location /api/ {
        proxy_pass http://overglow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://overglow_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://overglow_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
